name: Daily Vote Receipts Discovery

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run discovery pipeline
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          TOP_N_BILLS: ${{ vars.TOP_N_BILLS || '20' }}
        run: python pipeline.py

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: receipts-${{ github.run_number }}
          path: master_receipts_hub.json
          retention-days: 90

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master_receipts_hub.json
          git diff --cached --quiet || git commit -m "Update leaderboard — $(date -u +%Y-%m-%d)"
          git push
